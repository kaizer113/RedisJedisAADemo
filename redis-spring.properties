# Writer interval (milliseconds between writes)
writer.interval.ms=1000

# Metrics reporting interval (seconds)
metrics.interval.seconds=10

# Key TTL (seconds)
key.ttl.seconds=300

# Value size (bytes) - must be large enough for timestamp
value.size=500

# Connection pool settings
redis.pool.max.total=50
redis.pool.max.idle=25
redis.pool.min.idle=10

# Background load generation
background.load.enabled=true
background.load.threads=4
background.load.read.write.ratio=10

