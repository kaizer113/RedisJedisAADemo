# Redis Endpoints (comma-separated for JedisCluster)
#redis.endpoints=localhost:6379,localhost:6379
redis.endpoints=default:3lZp4viStvz7Yu53h0hVGupmQQvu67uz@redis-11036.mc2103-0.us-east-1-mz.ec2.cloud.rlrcp.com:11036,default:3lZp4viStvz7Yu53h0hVGupmQQvu67uz@redis-11036.mc2103-1.us-east-2-mz.ec2.cloud.rlrcp.com:11036

# Writer Configuration
writer.interval.ms=1000
writer.key.prefix=latency

# Value size (total size including timestamp)
# Timestamp format: "millis.nanos_" = ~21 bytes
# Actual padding size = value.size - 21
value.size=500

# Metrics Configuration
metrics.interval.seconds=15

# Background Load Configuration
background.load.enabled=true
background.load.read.write.ratio=100

# TTL Configuration
key.ttl.seconds=300

# Connection Pool Configuration
redis.pool.max.total=50
redis.pool.max.idle=20
redis.pool.min.idle=5

