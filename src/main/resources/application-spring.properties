# Spring Boot Application Properties for OSS Demo
spring.application.name=Redis OSS Demo

# Disable Spring Boot banner for cleaner output
spring.main.banner-mode=off

# Disable auto-configuration for components we don't need
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# Logging configuration
logging.level.root=INFO
logging.level.com.redis.demo=INFO
logging.level.org.springframework=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

